<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容审核 Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }

.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 30px 0; text-align: center; }
.header h1 { font-size: 28px; font-weight: 600; }
.header p { margin-top: 8px; opacity: 0.85; font-size: 15px; }

.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 28px; margin-bottom: 20px; }
.card h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card h2 .icon { font-size: 22px; }

/* Settings */
.setting-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: center; }
.setting-row label { min-width: 100px; font-size: 14px; color: #666; text-align: right; }
.setting-row input, .setting-row select { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
.setting-row input:focus, .setting-row select:focus { border-color: #667eea; }

.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.btn-primary { background: #667eea; color: #fff; }
.btn-primary:hover { background: #5a6fd6; }
.btn-primary:disabled { background: #b4bce4; cursor: not-allowed; }
.btn-success { background: #52c41a; color: #fff; }
.btn-success:hover { background: #47a816; }
.btn-sm { padding: 6px 16px; font-size: 13px; }
.btn-outline { background: transparent; border: 1px solid #667eea; color: #667eea; }

/* URL Input */
.url-input-group { display: flex; gap: 12px; align-items: center; }
.url-input-group input { flex: 1; padding: 12px 16px; border: 2px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; }
.url-input-group input:focus { border-color: #667eea; }
.url-input-group input::placeholder { color: #bbb; }
.url-actions { display: flex; gap: 12px; align-items: center; }

.parse-info { margin-top: 16px; padding: 14px 18px; background: #f0f2ff; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; }
.parse-info .info-text .name { font-weight: 600; font-size: 15px; }
.parse-info .info-text .meta { color: #666; font-size: 13px; margin-top: 4px; }
.parse-error { margin-top: 12px; padding: 10px 16px; background: #fff2f0; border-radius: 8px; color: #f5222d; font-size: 14px; }

/* Progress */
.progress-bar-outer { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 16px 0; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.3s; width: 0%; }
.progress-text { text-align: center; color: #999; font-size: 14px; margin-bottom: 8px; }
.progress-log { max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.8; padding: 12px 16px; background: #fafafa; border-radius: 8px; margin-top: 12px; }
.log-pass { color: #52c41a; }
.log-fail { color: #f5222d; }
.log-skip { color: #999; }
.log-err { color: #fa8c16; }

/* Results */
.summary { display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
.summary-item { flex: 1; min-width: 100px; padding: 16px; border-radius: 10px; text-align: center; }
.summary-item .num { font-size: 32px; font-weight: 700; }
.summary-item .label { font-size: 13px; color: #666; margin-top: 4px; }
.s-total { background: #f0f2ff; }
.s-total .num { color: #667eea; }
.s-pass { background: #f6ffed; }
.s-pass .num { color: #52c41a; }
.s-fail { background: #fff2f0; }
.s-fail .num { color: #f5222d; }
.s-skip { background: #f9f9f9; }
.s-skip .num { color: #999; }

.result-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
.result-table th, .result-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
.result-table th { background: #fafafa; font-weight: 500; color: #666; position: sticky; top: 0; }
.result-table tr:hover { background: #fafafa; }
.tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.tag-pass { background: #f6ffed; color: #52c41a; }
.tag-fail { background: #fff2f0; color: #f5222d; }
.tag-skip { background: #f9f9f9; color: #999; }
.tag-err { background: #fff7e6; color: #fa8c16; }

.violations { color: #f5222d; font-size: 12px; margin-top: 4px; }

.actions { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }

.write-back-msg { text-align: center; padding: 12px; background: #f6ffed; border-radius: 8px; color: #52c41a; font-weight: 500; margin-top: 12px; }
.write-back-err { text-align: center; padding: 12px; background: #fff2f0; border-radius: 8px; color: #f5222d; font-weight: 500; margin-top: 12px; }

.hidden { display: none !important; }

/* Toggle */
.toggle-btn { background: none; border: none; color: #667eea; cursor: pointer; font-size: 13px; padding: 0; }
.toggle-btn:hover { text-decoration: underline; }

/* Settings status */
.config-status { font-size: 13px; padding: 6px 12px; border-radius: 6px; display: inline-block; }
.config-ok { background: #f6ffed; color: #52c41a; }
.config-missing { background: #fff2f0; color: #f5222d; }

.knowledge-form textarea {
  width: 100%;
  min-height: 84px;
  padding: 10px 14px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  resize: vertical;
  font-family: inherit;
}
.knowledge-form textarea:focus { border-color: #667eea; }
.knowledge-list { max-height: 260px; overflow: auto; border: 1px solid #f0f0f0; border-radius: 10px; }
.knowledge-item { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
.knowledge-item:last-child { border-bottom: none; }
.knowledge-item .name { font-weight: 600; margin-bottom: 6px; }
.knowledge-item .meta { color: #666; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
.auth-card { display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap; }
.auth-meta { color:#666; font-size:14px; line-height:1.7; }
.auth-meta strong { color:#333; }
.auth-actions { display:flex; gap:12px; align-items:center; }
.auth-tip { margin-top:12px; padding:10px 14px; border-radius:8px; font-size:13px; }
.auth-tip.warn { background:#fff7e6; color:#ad6800; }
.auth-tip.err { background:#fff2f0; color:#cf1322; }
.auth-tip.info { background:#f0f5ff; color:#1d39c4; }
.mode-hint { color:#666; font-size:12px; margin-top:4px; }
</style>
</head>
<body>

<div class="header">
  <h1>内容审核 Agent</h1>
  <p>粘贴飞书表格链接，AI 自动审核内容并写回结果</p>
</div>

<div class="container">

  <div class="card" id="authCard">
    <h2><span class="icon">&#128274;</span> 登录状态</h2>
    <div class="auth-card">
      <div class="auth-meta" id="authSummary">检测中...</div>
      <div class="auth-actions">
        <button class="btn btn-outline hidden" id="loginBtn" onclick="startLogin()">钉钉登录</button>
        <button class="btn btn-outline hidden" id="logoutBtn" onclick="logout()">退出登录</button>
      </div>
    </div>
    <div class="auth-tip hidden" id="authTip"></div>
  </div>

  <!-- 设置 -->
  <div class="card" id="settingsCard">
    <h2>
      <span class="icon">&#9881;</span> 设置
      <span id="configStatus" class="config-status config-missing" style="margin-left:auto; font-weight:400;">未配置</span>
      <button class="toggle-btn" id="toggleSettings" style="margin-left:12px;" onclick="toggleSettings()">展开</button>
    </h2>
    <div id="settingsBody" class="hidden">
      <div class="setting-row">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-xxx...">
      </div>
      <div class="setting-row">
        <label>Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://ai-api.kkidc.com">
      </div>
      <div class="setting-row">
        <label>模型</label>
        <select id="model">
          <option value="claude-opus-4-6">claude-opus-4-6</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
          <option value="claude-3-5-sonnet-20241022">claude-3.5-sonnet</option>
          <option value="claude-3-haiku-20240307">claude-3-haiku</option>
        </select>
      </div>
      <div class="setting-row">
        <label>飞书 App ID</label>
        <input type="text" id="feishuAppId" placeholder="cli_xxx...">
      </div>
      <div class="setting-row">
        <label>飞书 Secret</label>
        <input type="password" id="feishuAppSecret" placeholder="飞书应用密钥">
      </div>
      <div class="setting-row">
        <label>OCR Provider</label>
        <select id="ocrProvider">
          <option value="">自动</option>
          <option value="volcengine">volcengine</option>
          <option value="disabled">disabled</option>
        </select>
      </div>
      <div class="setting-row">
        <label>火山 Access Key</label>
        <input type="password" id="volcengineAccessKey" placeholder="AKLT...">
      </div>
      <div class="setting-row">
        <label>火山 Secret Key</label>
        <input type="password" id="volcengineSecretKey" placeholder="Secret Access Key">
      </div>
      <div class="setting-row">
        <label>火山 Region</label>
        <input type="text" id="volcengineRegion" placeholder="cn-north-1">
      </div>
      <div class="setting-row">
        <label>启用钉钉登录</label>
        <select id="authEnabled">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>
      <div class="setting-row">
        <label>鉴权模式</label>
        <select id="authMode" onchange="renderAuthModeFields()">
          <option value="in_app">钉钉内免登</option>
          <option value="oauth">网页登录回调</option>
        </select>
      </div>
      <div class="setting-row auth-in-app-row">
        <label>Corp ID</label>
        <input type="text" id="dingtalkCorpId" placeholder="dingxxxxxxxx">
      </div>
      <div class="setting-row auth-in-app-row">
        <label>Agent ID</label>
        <input type="text" id="dingtalkAgentId" placeholder="可选，微应用 AgentId">
      </div>
      <div class="setting-row">
        <label>钉钉 App Key</label>
        <input type="text" id="dingtalkAppKey" placeholder="appKey">
      </div>
      <div class="setting-row">
        <label>钉钉 App Secret</label>
        <input type="password" id="dingtalkAppSecret" placeholder="appSecret">
      </div>
      <div class="setting-row auth-oauth-row">
        <label>回调地址</label>
        <input type="text" id="dingtalkRedirectUri" placeholder="例如 http://你的域名/api/auth/dingtalk/callback">
      </div>
      <div class="mode-hint">钉钉内免登适合公司员工从钉钉工作台进入；网页登录回调适合浏览器外链登录。</div>
      <div class="setting-row">
        <label>用户映射文件</label>
        <input type="text" id="userMappingPath" placeholder="默认 user_groups.json">
      </div>
      <div class="setting-row">
        <label>标准飞书链接</label>
        <input type="text" id="projectConfigFeishuUrl" placeholder="粘贴审核标准飞书表链接，可留空使用本地 CSV">
      </div>
      <div style="text-align:right; margin-top:8px;">
        <button class="btn btn-primary btn-sm" onclick="saveConfig()">保存设置</button>
      </div>
    </div>
  </div>

  <div class="card" id="knowledgeCard">
    <h2><span class="icon">&#128218;</span> 审核标准知识库</h2>
    <div class="knowledge-form">
      <div class="setting-row">
        <label>项目名称</label>
        <input type="text" id="kbProjectName" placeholder="例如：One Republic演唱会">
      </div>
      <div class="setting-row">
        <label>项目介绍</label>
        <textarea id="kbDescription" placeholder="可选，项目背景或补充说明"></textarea>
      </div>
      <div class="setting-row">
        <label>话题标签</label>
        <textarea id="kbHashtags" placeholder="例如：#美团会员包厢 #演唱会 #黑钻许愿真有用"></textarea>
      </div>
      <div class="setting-row">
        <label>利益点标准</label>
        <textarea id="kbBenefits" placeholder="每条标准可换行填写"></textarea>
      </div>
      <div class="setting-row">
        <label>审核严格度</label>
        <select id="kbStrictness">
          <option value="normal">normal</option>
          <option value="strict">strict</option>
          <option value="loose">loose</option>
        </select>
      </div>
      <div style="text-align:right; margin-top:8px;">
        <button class="btn btn-outline btn-sm" onclick="loadKnowledgeBase()">刷新列表</button>
        <button class="btn btn-primary btn-sm" onclick="saveKnowledgeBase()">新增/更新标准</button>
      </div>
    </div>
    <div id="knowledgeStatus" style="margin-top:12px; color:#666; font-size:13px;"></div>
    <div class="knowledge-list" id="knowledgeList" style="margin-top:14px;"></div>
  </div>

  <!-- 飞书链接输入 -->
  <div class="card" id="inputCard">
    <h2><span class="icon">&#128196;</span> 飞书表格</h2>
    <div style="margin-bottom:16px; color:#666; font-size:14px;" id="profileHint">将根据当前登录账号自动选择对应部门配置。</div>
    <div class="url-input-group">
      <input type="text" id="feishuUrl" placeholder="粘贴飞书表格链接，如 https://xxx.feishu.cn/sheets/xxx">
      <div class="url-actions">
        <button class="btn btn-outline" id="quickFillBtn" onclick="quickFillApprovedContent()">回填通过稿件</button>
        <button class="btn btn-primary" id="parseBtn" onclick="parseUrl()">解析</button>
      </div>
    </div>
    <div class="hidden" id="parseInfo">
      <div class="parse-info">
        <div class="info-text">
          <div class="name" id="sheetName"></div>
          <div class="meta" id="sheetMeta"></div>
        </div>
        <div style="display:flex; gap:12px;">
          <button class="btn btn-outline" id="fillBtn" onclick="fillApprovedContent()">回填通过稿件</button>
          <button class="btn btn-primary" id="startBtn" onclick="startReview()">开始审核</button>
        </div>
      </div>
    </div>
    <div class="hidden" id="parseError"></div>
  </div>

  <!-- 进度 -->
  <div class="card hidden" id="progressCard">
    <h2><span class="icon">&#9203;</span> 审核中...</h2>
    <div class="progress-text" id="progressText">准备中...</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <!-- 结果 -->
  <div class="card hidden" id="resultCard">
    <h2><span class="icon">&#9989;</span> 审核完成</h2>
    <div id="writeBackStatus"></div>
    <div class="summary">
      <div class="summary-item s-total"><div class="num" id="rTotal">0</div><div class="label">总计</div></div>
      <div class="summary-item s-pass"><div class="num" id="rPass">0</div><div class="label">通过</div></div>
      <div class="summary-item s-fail"><div class="num" id="rFail">0</div><div class="label">不通过</div></div>
      <div class="summary-item s-skip"><div class="num" id="rSkip">0</div><div class="label">已有结果跳过</div></div>
    </div>
    <div style="max-height:400px; overflow:auto;">
      <table class="result-table">
        <thead><tr><th>#</th><th>稿件链接</th><th>项目名称</th><th>AI审核</th><th>原因</th></tr></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="resetAll()">&#8635; 审核新表格</button>
    </div>
  </div>

</div>

<script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.1.2/dingtalk.open.js"></script>
<script>
let currentTaskId = null;
let authState = null;
let inAppLoginTried = false;

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s || '';
  return el.innerHTML;
}

// ─── Settings ───
function toggleSettings() {
  const body = document.getElementById('settingsBody');
  const btn = document.getElementById('toggleSettings');
  body.classList.toggle('hidden');
  btn.textContent = body.classList.contains('hidden') ? '展开' : '收起';
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    if (cfg.base_url) document.getElementById('baseUrl').value = cfg.base_url;
    if (cfg.model) document.getElementById('model').value = cfg.model;
    if (cfg.feishu_app_id) document.getElementById('feishuAppId').value = cfg.feishu_app_id;
    if (cfg.project_config_feishu_url) document.getElementById('projectConfigFeishuUrl').value = cfg.project_config_feishu_url;
    if (cfg.feishu_secret_display) {
      document.getElementById('feishuAppSecret').placeholder = '已保存: ' + cfg.feishu_secret_display;
    }
    if (cfg.ocr_provider !== undefined && cfg.ocr_provider !== null) {
      document.getElementById('ocrProvider').value = cfg.ocr_provider;
    }
    if (cfg.volcengine) {
      if (cfg.volcengine.region) document.getElementById('volcengineRegion').value = cfg.volcengine.region;
      if (cfg.volcengine.access_key_display) {
        document.getElementById('volcengineAccessKey').placeholder = '已保存: ' + cfg.volcengine.access_key_display;
      }
      if (cfg.volcengine.secret_key_display) {
        document.getElementById('volcengineSecretKey').placeholder = '已保存: ' + cfg.volcengine.secret_key_display;
      }
    }
    if (cfg.auth) {
      document.getElementById('authEnabled').value = String(!!cfg.auth.enabled);
      document.getElementById('authMode').value = cfg.auth.mode || 'in_app';
      if (cfg.auth.corp_id) document.getElementById('dingtalkCorpId').value = cfg.auth.corp_id;
      if (cfg.auth.agent_id) document.getElementById('dingtalkAgentId').value = cfg.auth.agent_id;
      if (cfg.auth.app_key) document.getElementById('dingtalkAppKey').value = cfg.auth.app_key;
      if (cfg.auth.redirect_uri) document.getElementById('dingtalkRedirectUri').value = cfg.auth.redirect_uri;
      if (cfg.auth.user_mapping_path) document.getElementById('userMappingPath').value = cfg.auth.user_mapping_path;
      if (cfg.auth.has_app_secret) document.getElementById('dingtalkAppSecret').placeholder = '已保存: app secret';
    }
    updateConfigStatus(!!cfg.has_api_key);
    renderAuthModeFields();
  } catch(e) {}
  await loadAuthState();
  loadKnowledgeBase();
}

function renderAuthModeFields() {
  const mode = document.getElementById('authMode').value || 'in_app';
  document.querySelectorAll('.auth-in-app-row').forEach(el => {
    el.classList.toggle('hidden', mode !== 'in_app');
  });
  document.querySelectorAll('.auth-oauth-row').forEach(el => {
    el.classList.toggle('hidden', mode !== 'oauth');
  });
}

async function loadAuthState() {
  try {
    const r = await fetch('/api/auth/me');
    authState = await r.json();
  } catch (e) {
    authState = {
      enabled: false,
      ready: false,
      authenticated: false,
      error: e.message,
    };
  }
  renderAuthState();
}

function renderAuthState() {
  const authCard = document.getElementById('authCard');
  const summary = document.getElementById('authSummary');
  const tip = document.getElementById('authTip');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const settingsCard = document.getElementById('settingsCard');
  const profileHint = document.getElementById('profileHint');
  const parseBtn = document.getElementById('parseBtn');
  const quickFillBtn = document.getElementById('quickFillBtn');

  tip.classList.add('hidden');
  tip.textContent = '';
  tip.className = 'auth-tip hidden';
  loginBtn.classList.add('hidden');
  logoutBtn.classList.add('hidden');

  if (!authState || !authState.enabled) {
    authCard.classList.add('hidden');
    summary.innerHTML = '<strong>登录模式：</strong>未启用钉钉登录，当前为本地管理模式。';
    settingsCard.classList.remove('hidden');
    profileHint.textContent = '当前未启用登录鉴权，默认使用本地配置的部门 profile。';
    parseBtn.disabled = false;
    quickFillBtn.disabled = false;
    return;
  }

  authCard.classList.remove('hidden');

  const user = authState.user || {};
  if (authState.authenticated) {
    summary.innerHTML = `<strong>当前用户：</strong>${esc(user.display_name || '')}　<strong>部门配置：</strong>${esc(user.profile_label || user.profile_id || '')}${user.is_admin ? '　<strong>角色：</strong>管理员' : ''}`;
    logoutBtn.classList.remove('hidden');
    settingsCard.classList.toggle('hidden', !user.is_admin);
    profileHint.textContent = `当前登录账号将自动使用「${user.profile_label || user.profile_id || ''}」对应的服务端 LLM 配置。`;
    parseBtn.disabled = false;
    quickFillBtn.disabled = false;
    return;
  }

  const isInAppMode = authState.in_dingtalk_mode !== false;
  summary.innerHTML = `<strong>登录模式：</strong>${isInAppMode ? '钉钉内免登' : '网页登录回调'}，当前未登录。`;
  if (!isInAppMode) loginBtn.classList.remove('hidden');
  settingsCard.classList.toggle('hidden', !!authState.ready);
  profileHint.textContent = isInAppMode
    ? '请在钉钉客户端内打开此应用，系统会自动识别你所属的部门配置。'
    : '请先使用钉钉登录，系统会自动判断你所属的部门配置。';
  parseBtn.disabled = true;
  quickFillBtn.disabled = true;

  if (!authState.ready) {
    tip.textContent = isInAppMode
      ? '钉钉内免登已启用，但 Corp ID / App Key / App Secret 还未配置完整。'
      : '钉钉登录已启用，但 App Key / App Secret / 回调地址 还未配置完整。';
    tip.className = 'auth-tip warn';
    tip.classList.remove('hidden');
  } else if (isInAppMode) {
    tip.textContent = '请从钉钉工作台打开本页面，前端会自动申请免登 code 并在服务端建立会话。';
    tip.className = 'auth-tip info';
    tip.classList.remove('hidden');
    maybeStartInAppLogin();
  }

  const params = new URLSearchParams(window.location.search);
  const authError = params.get('auth_error');
  if (authError) {
    tip.textContent = `登录失败：${authError}`;
    tip.className = 'auth-tip err';
    tip.classList.remove('hidden');
  }
}

function startLogin() {
  if (!authState || !authState.login_url) return;
  window.location.href = authState.login_url;
}

async function logout() {
  await fetch('/api/auth/logout', {method: 'POST'});
  window.location.href = '/';
}

async function saveConfig() {
  const key = document.getElementById('apiKey').value.trim();
  const data = {
    base_url: document.getElementById('baseUrl').value.trim(),
    model: document.getElementById('model').value,
    feishu_app_id: document.getElementById('feishuAppId').value.trim(),
    project_config_feishu_url: document.getElementById('projectConfigFeishuUrl').value.trim(),
    ocr_provider: document.getElementById('ocrProvider').value,
    volcengine: {
      access_key: document.getElementById('volcengineAccessKey').value.trim(),
      secret_key: document.getElementById('volcengineSecretKey').value.trim(),
      region: document.getElementById('volcengineRegion').value.trim(),
    },
    auth: {
      enabled: document.getElementById('authEnabled').value === 'true',
      mode: document.getElementById('authMode').value,
      dingtalk_corp_id: document.getElementById('dingtalkCorpId').value.trim(),
      dingtalk_agent_id: document.getElementById('dingtalkAgentId').value.trim(),
      dingtalk_app_key: document.getElementById('dingtalkAppKey').value.trim(),
      dingtalk_app_secret: document.getElementById('dingtalkAppSecret').value.trim(),
      dingtalk_redirect_uri: document.getElementById('dingtalkRedirectUri').value.trim(),
      user_mapping_path: document.getElementById('userMappingPath').value.trim(),
    }
  };
  if (key) data.api_key = key;
  const feishuSecret = document.getElementById('feishuAppSecret').value.trim();
  if (feishuSecret) data.feishu_app_secret = feishuSecret;

  const r = await fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  if (r.ok) {
    updateConfigStatus(true);
    document.getElementById('apiKey').value = '';
    document.getElementById('apiKey').placeholder = '已保存: ' + (key ? key.slice(0,6)+'***'+key.slice(-4) : '(之前的值)');
    if (feishuSecret) {
      document.getElementById('feishuAppSecret').value = '';
      document.getElementById('feishuAppSecret').placeholder = '已保存: ' + feishuSecret.slice(0,4) + '***' + feishuSecret.slice(-4);
    }
    const volcengineAccessKey = data.volcengine.access_key;
    const volcengineSecretKey = data.volcengine.secret_key;
    if (volcengineAccessKey) {
      document.getElementById('volcengineAccessKey').value = '';
      document.getElementById('volcengineAccessKey').placeholder = '已保存: ' + volcengineAccessKey.slice(0,6) + '***' + volcengineAccessKey.slice(-4);
    }
    if (volcengineSecretKey) {
      document.getElementById('volcengineSecretKey').value = '';
      document.getElementById('volcengineSecretKey').placeholder = '已保存: ' + volcengineSecretKey.slice(0,4) + '***' + volcengineSecretKey.slice(-4);
    }
    document.getElementById('dingtalkAppSecret').value = '';
    toggleSettings();
    await loadAuthState();
    await loadKnowledgeBase();
  }
}

function isDingTalkContainer() {
  const ua = navigator.userAgent || '';
  return /DingTalk/i.test(ua) || !!(window.dd && window.dd.runtime);
}

async function maybeStartInAppLogin() {
  if (inAppLoginTried) return;
  if (!authState || !authState.enabled || !authState.ready || !authState.in_dingtalk_mode) return;
  if (authState.authenticated) return;
  if (!isDingTalkContainer()) {
    const tip = document.getElementById('authTip');
    tip.textContent = '当前不是钉钉客户端环境，无法执行免登。请从钉钉工作台进入，或临时切换为网页登录回调模式。';
    tip.className = 'auth-tip warn';
    tip.classList.remove('hidden');
    return;
  }

  inAppLoginTried = true;
  const tip = document.getElementById('authTip');
  tip.textContent = '正在向钉钉申请免登身份...';
  tip.className = 'auth-tip info';
  tip.classList.remove('hidden');

  const corpId = authState.corp_id;
  if (!corpId) {
    tip.textContent = '未配置 Corp ID，无法发起钉钉内免登。';
    tip.className = 'auth-tip err';
    return;
  }

  const requestAuthCode = () => new Promise((resolve, reject) => {
    if (!(window.dd && dd.runtime && dd.runtime.permission && dd.runtime.permission.requestAuthCode)) {
      reject(new Error('当前页面未加载可用的钉钉 JSAPI'));
      return;
    }
    dd.ready(() => {
      dd.runtime.permission.requestAuthCode({
        corpId,
        onSuccess: resolve,
        onFail: reject,
      });
    });
    dd.error((err) => reject(err || new Error('钉钉 JSAPI 初始化失败')));
  });

  try {
    const res = await requestAuthCode();
    const authCode = res.code || res.authCode;
    if (!authCode) throw new Error('钉钉未返回免登 code');

    const loginResp = await fetch('/api/auth/dingtalk/in-app-login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({auth_code: authCode}),
    });
    const loginData = await loginResp.json();
    if (!loginResp.ok || loginData.error) {
      throw new Error(loginData.error || '服务端免登失败');
    }
    await loadAuthState();
  } catch (e) {
    tip.textContent = '钉钉免登失败: ' + (e.message || JSON.stringify(e));
    tip.className = 'auth-tip err';
    tip.classList.remove('hidden');
  }
}

async function loadKnowledgeBase() {
  const list = document.getElementById('knowledgeList');
  const status = document.getElementById('knowledgeStatus');
  status.textContent = '加载中...';
  try {
    const r = await fetch('/api/project-configs');
    const data = await r.json();
    if (data.error) {
      status.textContent = data.error;
      return;
    }
    status.textContent = `当前共 ${data.total} 条审核标准`;
    list.innerHTML = data.configs.map(cfg => `
      <div class="knowledge-item">
        <div class="name">${esc(cfg.project_name)}</div>
        <div class="meta">话题标签：${esc(cfg.hashtags || '')}</div>
        <div class="meta">利益点标准：${esc(cfg.benefit_standards || '')}</div>
      </div>
    `).join('');
  } catch (e) {
    status.textContent = '加载失败: ' + e.message;
  }
}

async function saveKnowledgeBase() {
  const projectName = document.getElementById('kbProjectName').value.trim();
  const hashtags = document.getElementById('kbHashtags').value.trim();
  const benefits = document.getElementById('kbBenefits').value.trim();
  if (!projectName || !hashtags || !benefits) {
    alert('项目名称、话题标签、利益点标准不能为空');
    return;
  }

  const payload = {
    project_name: projectName,
    description: document.getElementById('kbDescription').value.trim(),
    hashtags,
    benefit_standards: benefits,
    audit_strictness: document.getElementById('kbStrictness').value,
  };

  const r = await fetch('/api/project-configs', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  });
  const data = await r.json();
  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById('kbProjectName').value = '';
  document.getElementById('kbDescription').value = '';
  document.getElementById('kbHashtags').value = '';
  document.getElementById('kbBenefits').value = '';
  document.getElementById('kbStrictness').value = 'normal';
  document.getElementById('knowledgeStatus').textContent = data.message;
  await loadKnowledgeBase();
}

function updateConfigStatus(ok) {
  const el = document.getElementById('configStatus');
  el.textContent = ok ? '已配置' : '未配置';
  el.className = 'config-status ' + (ok ? 'config-ok' : 'config-missing');
}

// ─── Parse URL ───
async function doParseUrl({showError = true, toggleButton = true} = {}) {
  const url = document.getElementById('feishuUrl').value.trim();
  if (!url) {
    if (showError) alert('请输入飞书表格链接');
    return null;
  }

  const parseBtn = document.getElementById('parseBtn');
  if (toggleButton) {
    parseBtn.disabled = true;
    parseBtn.textContent = '解析中...';
  }
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('progressCard').classList.add('hidden');
  document.getElementById('inputCard').classList.remove('hidden');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('parseInfo').classList.add('hidden');
  document.getElementById('parseError').classList.add('hidden');

  try {
    const r = await fetch('/api/parse-url', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url }),
    });
    const data = await r.json();

    if (data.error) {
      if (showError) {
        document.getElementById('parseError').textContent = data.error;
        document.getElementById('parseError').className = 'parse-error';
      }
      return null;
    }

    currentTaskId = data.task_id;
    document.getElementById('sheetName').textContent = data.sheet;
    const skipInfo = data.new_count < data.total ? ` (${data.total - data.new_count} 条已有结果将跳过)` : '';
    document.getElementById('sheetMeta').textContent = `共 ${data.total} 条稿件，${data.new_count} 条待审核${skipInfo}`;
    document.getElementById('parseInfo').classList.remove('hidden');
    return data;
  } catch(e) {
    if (showError) {
      document.getElementById('parseError').textContent = '解析失败: ' + e.message;
      document.getElementById('parseError').className = 'parse-error';
    }
    return null;
  } finally {
    if (toggleButton) {
      parseBtn.disabled = false;
      parseBtn.textContent = '解析';
    }
  }
}

async function parseUrl() {
  await doParseUrl();
}

async function quickFillApprovedContent() {
  const url = document.getElementById('feishuUrl').value.trim();
  if (!url) { alert('请输入飞书表格链接'); return; }

  const btn = document.getElementById('quickFillBtn');
  const parseBtn = document.getElementById('parseBtn');
  btn.disabled = true;
  parseBtn.disabled = true;
  btn.textContent = '处理中...';
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('progressCard').classList.add('hidden');
  document.getElementById('inputCard').classList.remove('hidden');
  document.getElementById('parseError').classList.add('hidden');

  try {
    const parseData = await doParseUrl({showError: false, toggleButton: false});
    if (parseData.error) {
      document.getElementById('parseError').textContent = parseData.error;
      document.getElementById('parseError').className = 'parse-error';
      document.getElementById('parseError').classList.remove('hidden');
      return;
    }
    if (!parseData) {
      throw new Error('解析失败');
    }

    await startFillApprovedContentJob(currentTaskId, btn, parseBtn);
  } catch(e) {
    document.getElementById('parseError').textContent = '回填失败: ' + e.message;
    document.getElementById('parseError').className = 'parse-error';
    document.getElementById('parseError').classList.remove('hidden');
  } finally {
    btn.disabled = false;
    parseBtn.disabled = false;
    btn.textContent = '回填通过稿件';
  }
}

async function fillApprovedContent() {
  if (!currentTaskId) return;

  const btn = document.getElementById('fillBtn');
  btn.disabled = true;
  btn.textContent = '回填中...';

  try {
    await startFillApprovedContentJob(currentTaskId, btn);
  } catch (e) {
    alert('回填失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '回填通过稿件';
  }
}

async function parseJsonSafely(resp) {
  const text = await resp.text();
  try {
    return text ? JSON.parse(text) : {error: `空响应（HTTP ${resp.status})`};
  } catch (e) {
    return {error: text || `服务器返回了非 JSON 响应（HTTP ${resp.status})`};
  }
}

async function pollFillApprovedContentStatus(taskId, btn, extraBtn) {
  while (true) {
    await new Promise(resolve => setTimeout(resolve, 1200));
    const resp = await fetch(`/api/fill-approved-content/${taskId}/status`);
    const data = await parseJsonSafely(resp);
    if (data.error) throw new Error(data.error);

    const processed = data.processed_rows || 0;
    const total = data.total || 0;
    const label = total ? `回填中 ${processed}/${total}` : '回填中...';
    if (btn) btn.textContent = label;
    if (extraBtn) extraBtn.textContent = label;

    if (data.status === 'completed') return data;
    if (data.status === 'failed') throw new Error(data.error || data.message || '回填失败');
  }
}

async function startFillApprovedContentJob(taskId, btn, extraBtn) {
  const resp = await fetch(`/api/fill-approved-content/${taskId}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'}
  });
  const data = await parseJsonSafely(resp);
  if (data.error) throw new Error(data.error);

  const result = await pollFillApprovedContentStatus(taskId, btn, extraBtn);
  alert(result.message + `（更新 ${result.updated} 条，跳过 ${result.skipped} 条）`);
}

async function handleReviewStreamDisconnect(taskId) {
  try {
    const resp = await fetch(`/api/tasks/${taskId}/status`);
    const data = await parseJsonSafely(resp);
    if (data.error) {
      document.getElementById('progressText').textContent = '连接中断，且无法获取任务状态';
      return;
    }

    if (data.status === 'processing') {
      document.getElementById('progressText').textContent = '连接短暂中断，任务仍在后台执行，请稍候或刷新后重试查看进度';
      return;
    }

    if (data.status === 'completed') {
      document.getElementById('progressText').textContent = '审核已在后台完成，请重新解析表格查看最新结果';
      return;
    }

    if (data.status === 'failed') {
      document.getElementById('progressText').textContent = data.error || '审核失败';
      return;
    }
  } catch (e) {
    document.getElementById('progressText').textContent = '连接中断，请稍后重试';
  }
}

// ─── Review ───
async function ensureReadyTask() {
  const url = document.getElementById('feishuUrl').value.trim();
  if (!url) {
    alert('请输入飞书表格链接');
    return null;
  }

  if (!currentTaskId) {
    const parsed = await doParseUrl();
    return parsed ? currentTaskId : null;
  }

  try {
    const resp = await fetch(`/api/tasks/${currentTaskId}/status`);
    const data = await parseJsonSafely(resp);
    if (data.error || !data.status) {
      const parsed = await doParseUrl();
      return parsed ? currentTaskId : null;
    }
    if (data.status !== 'ready') {
      const parsed = await doParseUrl();
      return parsed ? currentTaskId : null;
    }
    return currentTaskId;
  } catch (e) {
    const parsed = await doParseUrl();
    return parsed ? currentTaskId : null;
  }
}

async function startReview() {
  const readyTaskId = await ensureReadyTask();
  if (!readyTaskId) return;

  document.getElementById('inputCard').classList.add('hidden');
  document.getElementById('progressCard').classList.remove('hidden');
  document.getElementById('startBtn').disabled = true;

  const log = document.getElementById('progressLog');
  log.innerHTML = '';

  const es = new EventSource(`/api/review/${readyTaskId}`);

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.type === 'status' && d.message) {
      document.getElementById('progressText').textContent = d.message;
    }

    if (d.type === 'progress') {
      const pct = Math.round(d.current / d.total * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      const detail = d.message || d.account || '';
      document.getElementById('progressText').textContent = detail && !detail.startsWith('处理第')
        ? `正在审核 ${d.current}/${d.total}：${detail}`
        : `正在审核 ${d.current}/${d.total}`;
    }

    if (d.type === 'item_done') {
      const r = d.result;
      let cls = 'log-skip';
      if (r.skipped) cls = 'log-skip';
      else if (r.label === '已过审') cls = 'log-pass';
      else if (r.label === '未过审') cls = 'log-fail';
      else if (r.label === '审核出错') cls = 'log-err';

      let line = `<span class="${cls}">[${r.seq}] ${esc(r.link_text)} — ${r.skipped ? '跳过('+esc(r.label)+')' : esc(r.label)}</span>`;
      if (r.label === '未过审' && !r.skipped) line += ` <span style="color:#999">${esc(r.reason)}</span>`;
      log.innerHTML += line + '<br>';
      log.scrollTop = log.scrollHeight;

      // Update progress bar for skipped items too
      const pct = Math.round(d.current / d.total * 100);
      document.getElementById('progressBar').style.width = pct + '%';
    }

    if (d.type === 'done') {
      es.close();
      showResults(d);
    }

    if (d.type === 'error') {
      es.close();
      document.getElementById('inputCard').classList.remove('hidden');
      document.getElementById('startBtn').disabled = false;
      document.getElementById('progressText').textContent = d.msg;
    }
  };

  es.onerror = () => {
    es.close();
    handleReviewStreamDisconnect(readyTaskId);
  };
}

function showResults(data) {
  document.getElementById('inputCard').classList.add('hidden');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('progressCard').classList.add('hidden');
  document.getElementById('resultCard').classList.remove('hidden');

  // Write-back status
  const wbEl = document.getElementById('writeBackStatus');
  if (data.source === 'feishu') {
    if (data.write_error) {
      wbEl.innerHTML = `<div class="write-back-err">写回飞书失败: ${esc(data.write_error)}</div>`;
    } else {
      wbEl.innerHTML = '<div class="write-back-msg">审核结果已写回飞书表格，未过审稿件已在原文档添加评论</div>';
    }
  } else {
    wbEl.innerHTML = '';
  }

  document.getElementById('rTotal').textContent = data.total;
  document.getElementById('rPass').textContent = data.passed;
  document.getElementById('rFail').textContent = data.failed;
  document.getElementById('rSkip').textContent = data.skipped || 0;

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';
  data.results.forEach(r => {
    let tagCls = 'tag-skip';
    if (r.skipped) tagCls = 'tag-skip';
    else if (r.label === '已过审') tagCls = 'tag-pass';
    else if (r.label === '未过审') tagCls = 'tag-fail';
    else if (r.label === '审核出错') tagCls = 'tag-err';

    let reason = esc(r.reason || '');
    if (r.violations && r.violations.length && r.label === '未过审' && !r.skipped) {
      reason += '<div class="violations">' + r.violations.map(v => '&middot; ' + esc(v)).join('<br>') + '</div>';
    }

    tbody.innerHTML += `<tr>
      <td>${r.seq}</td>
      <td>${esc(r.link_text)}</td>
      <td>${esc(r.project_name)}</td>
      <td><span class="tag ${tagCls}">${r.skipped ? '跳过' : esc(r.label)}</span></td>
      <td>${reason}</td>
    </tr>`;
  });
}

function resetAll() {
  currentTaskId = null;
  document.getElementById('inputCard').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('progressCard').classList.add('hidden');
  document.getElementById('parseInfo').classList.add('hidden');
  document.getElementById('parseError').classList.add('hidden');
  document.getElementById('feishuUrl').value = '';
  document.getElementById('writeBackStatus').innerHTML = '';
}

document.getElementById('feishuUrl').addEventListener('input', () => {
  currentTaskId = null;
  document.getElementById('parseInfo').classList.add('hidden');
  document.getElementById('parseError').classList.add('hidden');
});

// Init
loadConfig();
</script>
